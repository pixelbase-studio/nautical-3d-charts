<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind v4 Starter</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen bg-gray-50 text-gray-900 flex flex-col">

    <!-- Navbar -->
    <header class="bg-white border-b border-gray-200 px-6 py-4">
      <div class="max-w-5xl mx-auto flex items-center justify-between">
        <span class="text-xl font-bold tracking-tight">MyApp</span>
        <nav class="flex gap-6 text-sm font-medium text-gray-600">
          <a href="#" class="hover:text-gray-900 transition-colors">Home</a>
          <a href="#" class="hover:text-gray-900 transition-colors">About</a>
          <a href="#" class="hover:text-gray-900 transition-colors">Contact</a>
        </nav>
      </div>
    </header>

    <!-- Hero -->
    <main class="flex-1 flex items-center justify-center px-6 py-24">
      <div class="max-w-2xl text-center">
        <span class="inline-block bg-blue-100 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full mb-4 uppercase tracking-wide">
          Tailwind v4 + Vite
        </span>
        <h1 class="text-5xl font-extrabold tracking-tight mb-4 leading-tight">
          Build something <span class="text-blue-600">great.</span>
        </h1>
        <p class="text-lg text-gray-500 mb-8">
          A clean vanilla HTML/JS starter with Tailwind CSS v4 and Vite.
          Delete this and start building.
        </p>
        <div class="flex gap-4 justify-center">
          <a
            href="https://tailwindcss.com/docs"
            target="_blank"
            class="bg-blue-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors"
          >
            Tailwind Docs
          </a>
          <a
            href="https://vite.dev"
            target="_blank"
            class="bg-white border border-gray-300 text-gray-700 px-6 py-3 rounded-lg font-semibold hover:bg-gray-50 transition-colors"
          >
            Vite Docs
          </a>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="text-center text-sm text-gray-400 py-6 border-t border-gray-200">
      Built with Tailwind CSS v4 + Vite
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
